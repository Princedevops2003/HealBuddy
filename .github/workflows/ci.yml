# Basic CI: install dependencies and smoke-test backend + build frontend.
# Deploy: connect this repo in the Render dashboard (see README).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///:memory:
      SECRET_KEY: ci-test-secret
      JWT_SECRET: ci-test-jwt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test (create app)
        run: python -c "from app import create_app; app=create_app(); c=app.test_client(); r=c.get('/health'); assert r.status_code==200, r.data; print('health:', r.json)"

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build
        run: |
          npm ci
          npm run build
